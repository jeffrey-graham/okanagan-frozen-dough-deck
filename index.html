<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okanagan Frozen Dough — Flanagan Foodservice Sales Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f7a35; --green-dark:#0a5224; --green-bright:#1a9e44; --green-soft:#e7f4ec;
    --brown:#4a2e1e; --brown-soft:#f3ebe2; --brown-mid:#7a5236;
    --gold:#c98a3a; --gold-soft:#f8efdf;
    --ink:#241a13; --muted:#6a5a4c; --paper:#ffffff; --line:#e6ddd2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:#2a1a10;color:var(--ink);overflow:hidden}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .slide{
    position:absolute;width:min(97vw,1480px);height:min(95vh,832px);
    background:var(--paper);overflow:hidden;border-radius:20px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);
    opacity:0;transform:scale(.985);transition:opacity .45s ease, transform .45s ease;
    pointer-events:none;display:flex;flex-direction:column;
  }
  .slide.active{opacity:1;transform:none;pointer-events:auto}
  .pad{padding:clamp(40px,5.5vh,72px) clamp(52px,5.5vw,96px)}
  h1,h2,h3{font-family:'Poppins',sans-serif;line-height:1.08;color:var(--ink)}
  .eyebrow{font-family:'Poppins';font-weight:700;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:26px;height:3px;background:var(--green);border-radius:2px}
  p{color:var(--muted);font-size:16px;line-height:1.55}

  /* co-brand bar */
  .brandbar{display:flex;align-items:center;justify-content:space-between;padding:14px 58px;border-bottom:1px solid var(--line)}
  .flan{display:flex;align-items:center;gap:10px;font-family:'Poppins';font-weight:800;font-size:19px;color:var(--green)}
  .flan small{display:block;font-size:8.5px;letter-spacing:.22em;color:var(--muted);font-weight:600;margin-top:1px}
  .oklogo{height:44px;width:auto;display:block}
  .vs{color:var(--line);font-weight:300;font-size:18px;margin:0 2px}
  /* Flanagan official logo */
  .flanlogo{height:38px;width:auto;display:block}
  .cobrand .flanlogo{height:62px}

  /* COVER */
  .cover{background:radial-gradient(1100px 620px at 80% -12%, rgba(26,158,68,.35), transparent 60%),linear-gradient(135deg,#3a2316 0%, #4a2e1e 48%, #0a5224 130%);color:#fff;justify-content:center}
  .cover .pad{padding:58px 64px;position:relative;z-index:2}
  .cover .eyebrow{color:#ffd9a8}.cover .eyebrow::before{background:#ffd9a8}
  .cover h1{color:#fff;font-size:56px;font-weight:800;letter-spacing:-.5px}
  .cover .sub{color:#f1e6da;font-size:20px;margin-top:16px;max-width:640px;line-height:1.5}
  .cover .meta{margin-top:32px;display:flex;gap:28px;color:#e9d8c5;font-size:13.5px;font-weight:600;flex-wrap:wrap}
  .cover .heroimg{position:absolute;right:-30px;bottom:-40px;width:430px;height:430px;border-radius:50%;object-fit:cover;opacity:.92;border:10px solid rgba(255,255,255,.10);z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  /* chef mascot + speech bubble (bottom-right corner) */
  .mascot{position:absolute;right:38px;bottom:0;z-index:3;display:flex;flex-direction:column;align-items:center;width:300px;pointer-events:none}
  .mascot .chef{width:300px;height:auto;display:block;filter:drop-shadow(0 14px 26px rgba(0,0,0,.45));animation:bob 3.4s ease-in-out infinite}
  .mascot .bubble{position:relative;background:#fff;color:#0f7a35;font-family:'Poppins',sans-serif;font-weight:800;font-size:18px;line-height:1.2;padding:14px 20px;border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,.35);margin-bottom:8px;margin-right:90px;white-space:nowrap;animation:pop 3.4s ease-in-out infinite}
  .mascot .bubble .cash{color:#d19900}
  .mascot .bubble::after{content:"";position:absolute;left:50%;bottom:-12px;transform:translateX(-50%);border-width:13px 11px 0 11px;border-style:solid;border-color:#fff transparent transparent transparent}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes pop{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-5px) rotate(1deg)}}
  @media (prefers-reduced-motion:reduce){.mascot .chef,.mascot .bubble{animation:none}}
  .cobrand{display:flex;align-items:center;gap:16px;margin-bottom:28px}
  .cobrand .flan{color:#fff}.cobrand .flan small{color:#bdf0cf}
  .cobrand .vs{color:rgba(255,255,255,.4)}
  .oklogo.onbrown{background:#fff;border-radius:50%;padding:3px}

  .body{flex:1;overflow:auto;display:flex;flex-direction:column;justify-content:center;gap:6px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:stretch}

  h2.title{font-size:38px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
  .lead{font-size:19px;color:var(--ink);font-weight:500;margin-bottom:24px;max-width:900px;line-height:1.5}

  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 26px;box-shadow:0 6px 16px rgba(74,46,30,.05);display:flex;flex-direction:column}
  .card h3{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--brown)}
  .card p{font-size:15px}
  .card .ic{width:48px;height:48px;border-radius:13px;background:var(--green-soft);display:flex;align-items:center;justify-content:center;margin-bottom:15px;font-size:23px}
  .card.b .ic{background:var(--gold-soft)}

  .stat{display:flex;flex-direction:column;gap:3px}
  .stat .num{font-family:'Poppins';font-weight:800;font-size:38px;color:var(--green);line-height:1}
  .stat .num.b{color:var(--brown)}
  .stat .lab{font-size:13px;color:var(--muted);font-weight:600}
  .statrow{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

  ul.bullets{list-style:none;display:flex;flex-direction:column;gap:11px;margin-top:4px}
  ul.bullets li{position:relative;padding-left:34px;font-size:17px;color:var(--ink);line-height:1.5}
  ul.bullets li::before{content:"";position:absolute;left:0;top:2px;width:20px;height:20px;border-radius:6px;background:var(--green-soft)}
  ul.bullets li::after{content:"✓";position:absolute;left:4px;top:0;color:var(--green);font-weight:800;font-size:14px}
  ul.bullets li b{color:var(--brown)}

  .panel{background:var(--brown-soft);border-radius:16px;padding:28px 30px}
  .panel.g{background:var(--green-soft)}
  .panel h3{font-size:20px;color:var(--brown);margin-bottom:14px;font-weight:700}
  .panel.g h3{color:var(--green-dark)}

  /* product gallery */
  .gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:6px}
  .prod{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 4px 14px rgba(74,46,30,.05);display:flex;flex-direction:column}
  .prod .ph{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;background:#f3ebe2}
  .prod .info{padding:12px 15px 13px}
  .prod .nm{font-family:'Poppins';font-weight:700;font-size:15px;color:var(--ink);line-height:1.15}
  .prod .meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:inline}
  .prod .code{font-size:12px;color:var(--brown-mid);font-weight:700;font-variant-numeric:tabular-nums;margin-right:6px;display:inline}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-family:'Poppins';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:7px 9px;border-bottom:2px solid var(--line)}
  td{padding:6.5px 9px;border-bottom:1px solid var(--line);color:var(--ink)}
  td.code{font-variant-numeric:tabular-nums;color:var(--brown-mid);font-weight:600;font-size:12.5px}
  tr:hover td{background:var(--gold-soft)}
  .cols2{column-count:2;column-gap:32px}

  .talk{display:flex;flex-direction:column;gap:16px}
  .talk .q{background:#fff;border-left:4px solid var(--green);border-radius:0 12px 12px 0;padding:18px 22px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
  .talk .q .obj{font-weight:700;color:var(--ink);font-size:16.5px;margin-bottom:5px}
  .talk .q .obj::before{content:"“";color:var(--brown);font-size:21px;font-weight:800;margin-right:2px}
  .talk .q .ans{font-size:15px;color:var(--muted);line-height:1.5}
  .talk .q .ans b{color:var(--green-dark)}

  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:10px}
  .step{background:#fff;border:1px solid var(--line);border-radius:15px;padding:22px 20px}
  .step .n{font-family:'Poppins';font-weight:800;font-size:13px;color:#fff;background:var(--green);width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
  .step h3{font-size:16.5px;margin-bottom:6px;color:var(--brown)}
  .step p{font-size:14px}

  .closing{background:linear-gradient(135deg,#4a2e1e 0%,#0a5224 110%);color:#fff;justify-content:center}
  .closing h2{color:#fff;font-size:40px;font-weight:800}
  .closing p{color:#f1e6da;font-size:17px;margin-top:12px;max-width:660px}
  .closing .cta{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap}
  .closing .cta .bn{background:#fff;color:var(--brown);font-weight:700;padding:12px 17px;border-radius:11px;font-size:14px}
  .closing .cta .bn.ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.4)}

  .foot{display:flex;align-items:center;justify-content:space-between;padding:12px 58px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .foot .pg{font-weight:700;color:var(--brown)}
  .controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:13px;background:rgba(42,26,16,.85);padding:8px 15px;border-radius:40px;backdrop-filter:blur(8px);z-index:50}
  .controls button{background:#fff;border:none;width:37px;height:37px;border-radius:50%;cursor:pointer;font-size:17px;color:var(--brown);display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .controls button:hover{transform:scale(1.08)}
  .controls button:disabled{opacity:.35;cursor:default;transform:none}
  .counter{color:#fff;font-size:13px;font-weight:600;min-width:58px;text-align:center}
  .dots{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50;flex-wrap:wrap;max-width:60vw;justify-content:center}
  .dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:.2s}
  .dots i.on{background:#fff;width:22px;border-radius:6px}
  .hint{position:fixed;bottom:22px;right:24px;color:rgba(255,255,255,.55);font-size:12px;z-index:50}
  @media (max-width:760px){
    .pad{padding:24px 20px}.brandbar,.foot{padding-left:20px;padding-right:20px}
    .cover h1{font-size:34px}.cover .heroimg{display:none}
    .mascot{width:200px;right:16px}.mascot .chef{width:200px}.mascot .bubble{font-size:14px;margin-right:60px;padding:10px 14px}
    .grid2,.grid3,.statrow,.steps{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(2,1fr)}
    h2.title{font-size:25px}.cols2{column-count:1}
  }
</style>
</head>
<body>
<div class="dots" id="dots"></div>
<div class="stage" id="stage"></div>
<div class="controls"><button id="prev">‹</button><span class="counter" id="counter"></span><button id="next">›</button></div>
<div class="hint">← / → to navigate</div>

<script>
const TOTAL = 11;
const leaf = c => `<svg width="28" height="28" viewBox="0 0 64 64" fill="none"><path d="M32 6c5 8 2 14-3 18 7-2 13 1 16 7-6 1-10 5-11 11 5-4 11-4 15 0-3 6-9 8-15 7 4 5 4 11 0 15-4-5-5-11-2-16-6 4-12 3-16-2 6-2 9-7 9-13-6 2-12-1-15-7 7-2 13 0 17 5-4-6-3-13 2-18 0 0 3-3 3-7z" fill="${c}"/></svg>`;
const OKLOGO = `<img class="oklogo" src="img/logo.png" alt="Okanagan Frozen Dough">`;

const FLANLOGO = `<img class="flanlogo" src="img/flanagan_green.png" alt="Flanagan Foodservice — The Difference You Deserve">`;
const FLANLOGO_W = `<img class="flanlogo onbrand" src="img/flanagan_white.png" alt="Flanagan Foodservice — The Difference You Deserve">`;
function bar(){return `<div class="brandbar">
  ${FLANLOGO}
  ${OKLOGO}
</div>`;}
function foot(n){return `<div class="foot"><span>Okanagan Frozen Dough · Sales Briefing · Prepared for the Flanagan Sales Team</span><span class="pg">${n} / ${TOTAL}</span></div>`;}

// product card helper
function prod(img,name,code,meta){return `<div class="prod"><img class="ph" src="img/${img}" alt="${name}" loading="lazy"><div class="info"><div class="nm">${name}</div><div><span class="code">#${code}</span><span class="meta">${meta}</span></div></div></div>`;}

const slides = [];

/* 1 — COVER */
slides.push(`<section class="slide cover">
  <img class="heroimg" src="img/bun_hamburger.jpg" alt="">
  <div class="pad">
    <div class="cobrand">
      ${FLANLOGO_W}
      <span class="vs">×</span>
      <img class="oklogo onbrown" style="height:64px" src="img/logo.png" alt="Okanagan Frozen Dough">
    </div>
    <div class="eyebrow">Supplier Spotlight · Sales Team Briefing</div>
    <h1>Selling Okanagan<br>Frozen Dough</h1>
    <p class="sub">A proudly-Canadian, SQF-certified frozen dough partner — 30+ bread, bun, pizza &amp; freezer-to-oven items ready to stock your customer's shelves.</p>
    <div class="meta"><span>● Family-owned since 1994</span><span>● 30+ items in the Flanagan warehouse</span><span>● Thaw · proof · bake</span></div>
  </div>
  <div class="mascot" style="right:24%">
    <div class="bubble">Let's make some dough <span class="cash">$$$</span></div>
    <img class="chef" src="img/boss_chef.png" alt="Flanagan chef mascot">
  </div>
</section>`);

/* 2 — WHY THIS MATTERS */
slides.push(`<section class="slide">
  ${bar()}
  <div class="body pad">
    <div class="eyebrow">Why This Line Matters To Your Accounts</div>
    <h2 class="title">Fresh-baked sells — without a scratch bakery</h2>
    <p class="lead">Operators want fresh-baked aroma, margin and traffic — but lack the labour to bake from scratch. Okanagan closes the gap: thaw · proof · bake, or freezer-to-oven in one step.</p>
    <div class="grid3">
      <div class="card"><div class="ic">🔥</div><h3>Fresh-baked draw</h3><p>Aroma drives impulse buys · signals quality · works across grocery, c-store, QSR &amp; casual dining.</p></div>
      <div class="card b"><div class="ic">💰</div><h3>Strong margins</h3><p>Healthy markups vs. finished product · minimal skilled labour · bake-to-demand waste control.</p></div>
      <div class="card"><div class="ic">🇨🇦</div><h3>Canadian story</h3><p>Proudly-Canadian · family-owned · a perfect fit with Flanagan's "Proudly Canadian &amp; Family-Owned" positioning.</p></div>
    </div>
  </div>
  ${foot(2)}
</section>`);

/* 3 — WHO IS OKANAGAN */
slides.push(`<section class="slide">
  ${bar()}
  <div class="body pad">
    <div class="eyebrow">Know Your Supplier</div>
    <h2 class="title">Who is Okanagan Frozen Dough?</h2>
    <div class="grid2" style="margin-top:12px">
      <div>
        <ul class="bullets">
          <li><b>Family owned &amp; operated since 1994</b> — started in the back of a commercial bakery in Vernon, BC.</li>
          <li>A <b>leader in the Canadian bakery market</b>, now supplying major retailers across North America.</li>
          <li>Made with <b>wheat grown in Western Canada</b>, milled less than an hour from the plants.</li>
          <li><b>"We test-bake every mix"</b> — product performs in your customer's bakery exactly as expected, every time.</li>
        </ul>
      </div>
      <div class="panel">
        <h3>Proof points that sell</h3>
        <div class="statrow">
          <div class="stat"><span class="num b">30+</span><span class="lab">Years of experience</span></div>
          <div class="stat"><span class="num">30+</span><span class="lab">Items stocked at Flanagan</span></div>
          <div class="stat"><span class="num b">SQF</span><span class="lab">Certified · 3rd-party audited</span></div>
          <div class="stat"><span class="num">2</span><span class="lab">Western-Canada plants</span></div>
        </div>
      </div>
    </div>
  </div>
  ${foot(3)}
</section>`);

/* 4 — STOCKED ASSORTMENT OVERVIEW */
slides.push(`<section class="slide">
  ${bar()}
  <div class="body pad">
    <div class="eyebrow">What We Stock</div>
    <h2 class="title">30+ Okanagan items, ready in our warehouse</h2>
    <p class="lead">In the Flanagan book today — no special-order lead times. Four ways to sell the bakery category.</p>
    <div class="grid3" style="grid-template-columns:repeat(4,1fr)">
      <div class="card"><div class="ic">🍞</div><h3>Breads · 13</h3><p>White, Sourdough, French, Whole Wheat, Multi Grain, Alpine Grain, Cheddar, Rye, Pumpernickel, Raisin &amp; more — mostly 32 × 530g loaves.</p></div>
      <div class="card b"><div class="ic">🍔</div><h3>Buns &amp; Rolls · 13</h3><p>Hamburger, Hot Dog, Kaiser, Sub (8"/9"/12"), Panini, Focaccia, Sausage, Vienna, Scotch Bap, Crusty White &amp; more.</p></div>
      <div class="card"><div class="ic">🍕</div><h3>Pizza &amp; Sticks · 2</h3><p>32oz Pizza Dough Ball and Cheddar Dough Sticks — built for in-store pizza and grab-and-go sides.</p></div>
      <div class="card b"><div class="ic">🍪</div><h3>Freezer-to-Oven · 3</h3><p>Chocolate Chip &amp; Peanut Butter Chip cookie dough, plus Cinnamon Chip scones — easy add-on dollars.</p></div>
    </div>
  </div>
  ${foot(4)}
</section>`);

/* 5 — BREADS GALLERY */
slides.push(`<section class="slide">
  ${bar()}
  <div class="body pad">
    <div class="eyebrow">Stocked Breads</div>
    <h2 class="title">Breads — 13 stocked loaves</h2>
    <div class="gallery">
      ${prod('bread_white.jpg','White','128784','32 × 530g')}
      ${prod('bread_sourdough.jpg','Sourdough','128773','30 × 530g')}
      ${prod('bread_french.jpg','French','128775','32 × 530g')}
      ${prod('bread_ww.jpg','Whole Wheat','128782','32 × 530g')}
      ${prod('bread_multigrain_italian.jpg','Multigrain Italian','128822','32 × 530g')}
      ${prod('bread_white.jpg','Alpine Grain','128777','32 × 530g')}
      ${prod('bread_cinnamon_raisin.jpg','Cinnamon Raisin','128871','28 × 540g')}
      ${prod('bread_sourdough.jpg','Rye Winnipeg','128816','32 × 530g')}
    </div>
    <p style="font-size:12px;margin-top:13px">Plus: Cheddar (128862), Multi Grain (128793), Raisin (128774), Pumpernickel (128817). Photos representative of the Okanagan line.</p>
  </div>
  ${foot(5)}
</section>`);

/* 6 — BUNS GALLERY */
slides.push(`<section class="slide">
  ${bar()}
  <div class="body pad">
    <div class="eyebrow">Stocked Buns &amp; Rolls</div>
    <h2 class="title">Buns &amp; Rolls — 13 stocked items</h2>
    <div class="gallery">
      ${prod('bun_hamburger.jpg','Hamburger White','128794','200 × 65g')}
      ${prod('bun_hotdog.jpg','Hot Dog','128769','200 × 60g')}
      ${prod('bun_kaiser.jpg','Kaiser','128768','168 × 80g')}
      ${prod('bun_sourdough.jpg','Sourdough Bun','128835','168 × 85g')}
      ${prod('bun_kaiser.jpg','Sub White 12"','128791','100 × 185g')}
      ${prod('bun_hamburger.jpg','Italian Panini','128767','180 × 75g')}
      ${prod('bun_sourdough.jpg','Focaccia','128828','180 × 75g')}
      ${prod('bun_hamburger.jpg','Chunky Cheddar','128772','180 × 75g')}
    </div>
    <p style="font-size:12px;margin-top:13px">Plus: Sub White 9" (128830) &amp; 8" (128855), Sausage (128838), Vienna Roll (128795), Crusty White Large (128778), Scotch Bap (128834), Herb &amp; Cheese Sub 12" (128868).</p>
  </div>
  ${foot(6)}
</section>`);

/* 7 — PIZZA + FREEZER TO OVEN GALLERY */
slides.push(`<section class="slide">
  ${bar()}
  <div class="body pad">
    <div class="eyebrow">Pizza, Sticks &amp; Freezer-to-Oven</div>
    <h2 class="title">The easy add-on sells</h2>
    <div class="gallery" style="grid-template-columns:repeat(5,1fr)">
      ${prod('pizza.jpg','Pizza Dough Ball 32oz','128840','18 × 907g')}
      ${prod('sticks_cheese.jpg','Cheddar Dough Sticks','128796','155 × 85g')}
      ${prod('cookie_choc.jpg','Cookie — Chocolate Chip','128864','72 × 85g')}
      ${prod('cookie_pb.jpg','Cookie — Peanut Butter','128863','72 × 85g')}
      ${prod('scone_cinnamon.jpg','Scone — Cinnamon Chip','128857','105 × 112g')}
    </div>

const stage=document.getElementById('stage');
stage.innerHTML=slides.join('');
const els=[...document.querySelectorAll('.slide')];
const dots=document.getElementById('dots');
els.forEach((_,i)=>{const d=document.createElement('i');if(i===0)d.className='on';d.onclick=()=>go(i);dots.appendChild(d);});
let cur=0;
const counter=document.getElementById('counter');
const prev=document.getElementById('prev');
const next=document.getElementById('next');
function go(n){
  cur=Math.max(0,Math.min(els.length-1,n));
  els.forEach((s,i)=>s.classList.toggle('active',i===cur));
  [...dots.children].forEach((d,i)=>d.classList.toggle('on',i===cur));
  counter.textContent=`${cur+1} / ${els.length}`;
  prev.disabled=cur===0;next.disabled=cur===els.length-1;
}
prev.onclick=()=>go(cur-1);next.onclick=()=>go(cur+1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1);}
  if(e.key==='Home')go(0);if(e.key==='End')go(els.length-1);
});
go(0);
</script>
